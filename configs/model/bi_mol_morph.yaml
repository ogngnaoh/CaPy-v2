# B4: Bi-modal mol + morph (CLOOME-equivalent baseline)
name: bi_mol_morph
modalities: [mol, morph]

mol_encoder:
  input_dim: 2048
  hidden_dims: [512, 256]
  output_dim: 256
  dropout: 0.3

morph_encoder:
  input_dim: 1774  # Overridden at runtime from feature_columns.json
  hidden_dims: [512, 256]
  output_dim: 256
  dropout: 0.3

projection:
  input_dim: 256
  hidden_dim: 256
  output_dim: 256

embedding_dim: 256
