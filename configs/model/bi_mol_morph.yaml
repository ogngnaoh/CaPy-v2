# B4: Bi-modal mol + morph (CLOOME-equivalent baseline)
name: bi_mol_morph
modalities: [mol, morph]

mol_encoder:
  input_dim: 2048
  hidden_dims: [1024, 1024, 1024]
  output_dim: 512
  dropout: 0.1

morph_encoder:
  input_dim: 1500
  hidden_dims: [1024, 1024]
  output_dim: 512
  dropout: 0.1

projection:
  input_dim: 512
  hidden_dim: 512
  output_dim: 256

embedding_dim: 256
