# B5: Bi-modal mol + expr
name: bi_mol_expr
modalities: [mol, expr]

mol_encoder:
  input_dim: 2048
  hidden_dims: [512, 256]
  output_dim: 256
  dropout: 0.3

expr_encoder:
  input_dim: 978
  hidden_dims: [512, 256]
  output_dim: 256
  dropout: 0.3

projection:
  input_dim: 256
  hidden_dim: 256
  output_dim: 256

embedding_dim: 256
