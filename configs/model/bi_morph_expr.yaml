# B6: Bi-modal morph + expr
name: bi_morph_expr
modalities: [morph, expr]

morph_encoder:
  input_dim: 1500
  hidden_dims: [1024, 1024]
  output_dim: 512
  dropout: 0.1

expr_encoder:
  input_dim: 978
  hidden_dims: [1024, 1024]
  output_dim: 512
  dropout: 0.1

projection:
  input_dim: 512
  hidden_dim: 512
  output_dim: 256

embedding_dim: 256
