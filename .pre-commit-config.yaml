repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix]

  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        args: [--line-length, "88"]

  - repo: local
    hooks:
      - id: block-data-checkpoints
        name: Block data and checkpoint commits
        entry: bash -c 'for f in "$@"; do case "$f" in data/raw/*|data/processed/*|checkpoints/*) echo "BLOCKED: $f"; exit 1;; esac; done' --
        language: system
        pass_filenames: true
